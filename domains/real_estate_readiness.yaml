              source: "slot_fill"
              count: 1
          generation_prompt: "Present a scenario where the customer is frustrated, anxious, or emotional. Ask how the agent would handle the interaction."
          follow_up_flag: true
          max_follow_ups: 2
        - id: "customer.problem_solving"
          label: "Problem Solving & Judgment"
          weight: 0.125
          archetype_mix:
            - archetype: "case"
              source: "free_llm"
              count: 1
          generation_prompt: "Give a complex customer issue (budget mismatch, delivery delay, documentation problem) and ask the candidate to solve it."
          follow_up_flag: true
          max_follow_ups: 2
        - id: "customer.influence"
          label: "Influence & Persuasion"
          weight: 0.125
          archetype_mix:
            - archetype: "knowledge"
              source: "kb_prompt"
              count: 1
          generation_prompt: "Ask how the candidate would gently guide a hesitant customer toward a good decision without being pushy."
          follow_up_flag: true
          max_follow_ups: 2
        - id: "customer.ownership"
          label: "Ownership & Accountability"
          weight: 0.125
          archetype_mix:
            - archetype: "behavioural"
              source: "star"
              count: 1
          generation_prompt: "Ask for a past example where the candidate went above and beyond to ensure a customer had a great experience."
          follow_up_flag: true
          max_follow_ups: 1
        - id: "customer.discipline"
          label: "Operational Discipline"
          weight: 0.125
          archetype_mix:
            - archetype: "knowledge"
              source: "kb_prompt"
              count: 1
          generation_prompt: "Ask how the candidate balances following compliance processes (RERA, documentation, legal checks) while keeping the customer experience positive."
          follow_up_flag: true
          max_follow_ups: 2
        - id: "customer.stress"
          label: "Stress Tolerance & Recovery"
          weight: 0.125
          archetype_mix:
            - archetype: "situational"
              source: "slot_fill"
              count: 1
          generation_prompt: "Present a high-pressure scenario: multiple customers waiting, a deal about to fall through, or an irate customer on the phone."
          follow_up_flag: true
          max_follow_ups: 2
        - id: "customer.adaptability"
          label: "Learning & Adaptability"
          weight: 0.125
          archetype_mix:
            - archetype: "knowledge"
              source: "kb_prompt"
              count: 1
          generation_prompt: "Ask how the candidate adapts their communication and sales style when dealing with different customer segments: first-time buyers, investors, NRIs, senior citizens."
          follow_up_flag: true
          max_follow_ups: 2

competencies:
  - "handling customer objections"
  - "negotiating property deals"
  - "explaining legal and financial documents"
  - "building long-term client relationships"
  - "managing multiple leads simultaneously"
  - "translating technical real-estate terms for customers"
  - "resolving customer complaints effectively"

situational_slots:
  role:
    - "real estate agent"
    - "property consultant"
    - "sales advisor"
    - "customer relationship manager"
  constraint:
    - "tight customer budget"
    - "limited inventory in the preferred location"
    - "strict RERA compliance requirements"
    - "builder facing delivery delays"
    - "customer is an NRI with limited physical presence"
  stakeholder:
    - "first-time homebuyer"
    - "real estate investor"
    - "NRI family"
    - "senior citizen downsizing"
    - "young professional couple"
  pressure:
    - "closing deadline is approaching this week"
    - "customer is threatening to walk away from the deal"
    - "multiple offers on the same shortlisted property"
    - "customer is unhappy with the payment terms"
    - "documentation is incomplete and the registration date is near"
